service: plausible
image: <%= ENV['REGISTRY_USERNAME'] %>/plausible-ce

servers:
  web:
    hosts:
      - <%= ENV['SERVER_IP'] %>
    cmd: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    options:
      ulimit: "nofile=65535:65535"

proxy:
  host: <%= ENV['PLAUSIBLE_HOST'] %>
  app_port: 8000
  ssl: true
  healthcheck:
    path: /api/health
    interval: 3
    timeout: 5
  # forward_headers defaults to false with ssl: true — kamal-proxy
  # sets X-Forwarded-For from the real client IP. Only set to true
  # if you have a trusted CDN/load balancer in front.
  # forward_headers: true

ssh:
  user: <%= ENV['SSH_USER'] %>
  port: <%= ENV['SSH_PORT'] %>

registry:
<% if ENV['REGISTRY_SERVER'] %>
  server: <%= ENV['REGISTRY_SERVER'] %>
<% end %>
  username: <%= ENV['REGISTRY_USERNAME'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch:
    - amd64

env:
  clear:
    BASE_URL: https://<%= ENV['PLAUSIBLE_HOST'] %>
    DISABLE_REGISTRATION: invite_only
    CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events_db
    TMPDIR: /var/lib/plausible/tmp
<% if ENV['SMTP_HOST_ADDR'] %>
    SMTP_HOST_ADDR: <%= ENV['SMTP_HOST_ADDR'] %>
    SMTP_HOST_PORT: "<%= ENV.fetch('SMTP_HOST_PORT', '587') %>"
    SMTP_HOST_SSL_ENABLED: "<%= ENV.fetch('SMTP_HOST_SSL_ENABLED', 'true') %>"
<% end %>
<% if ENV['MAILER_EMAIL'] %>
    MAILER_EMAIL: <%= ENV['MAILER_EMAIL'] %>
<% end %>
<% if ENV['MAILER_NAME'] %>
    MAILER_NAME: <%= ENV['MAILER_NAME'] %>
<% end %>
  secret:
    - SECRET_KEY_BASE
    - TOTP_VAULT_KEY
    - DATABASE_URL
<% if ENV['SMTP_USER_NAME'] %>
    - SMTP_USER_NAME
    - SMTP_USER_PWD
<% end %>
<% if ENV['GOOGLE_CLIENT_ID'] %>
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
<% end %>
<% if ENV['MAXMIND_LICENSE_KEY'] %>
    - MAXMIND_LICENSE_KEY
<% end %>

volumes:
  - "plausible-data:/var/lib/plausible"

deploy_timeout: 120
readiness_delay: 10
retain_containers: 3

accessories:
  db:
    # Postgres 16 is what Plausible officially tests against.
    image: postgres:16-alpine
    host: <%= ENV['SERVER_IP'] %>
    env:
      secret:
        - POSTGRES_PASSWORD
    directories:
      - plausible-db-data:/var/lib/postgresql/data
    options:
      health-cmd: "pg_isready -U postgres"
      health-interval: 10s

  events-db:
    image: clickhouse/clickhouse-server:24.12-alpine
    host: <%= ENV['SERVER_IP'] %>
    env:
      clear:
        CLICKHOUSE_SKIP_USER_SETUP: "1"
    directories:
      - plausible-events-data:/var/lib/clickhouse
      - plausible-events-logs:/var/log/clickhouse-server
    files:
      - clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml
      - clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml
      - clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml
      - clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml
    options:
      ulimit: "nofile=262144:262144"
      health-cmd: "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"
      health-interval: 10s
